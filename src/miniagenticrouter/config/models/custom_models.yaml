# Custom Model Configuration
#
# Define custom models for cost tracking, connection settings, and model information.
#
# Usage:
#   1. Add model definitions in this file (project-level)
#   2. Or copy to ~/.config/mini-agentic-router/custom_models.yaml (user-level)
#
# Configuration Options:
#   - display_name: Human-readable name for the model
#   - provider: litellm provider identifier (openai, anthropic, etc.)
#   - max_tokens: Maximum tokens the model can generate
#   - max_input_tokens: Maximum input context length
#   - max_output_tokens: Maximum output tokens
#   - input_cost_per_million: Cost per 1M input tokens (USD)
#   - output_cost_per_million: Cost per 1M output tokens (USD)
#   - supports_vision: Whether the model supports image inputs
#   - supports_function_calling: Whether the model supports function calling
#
# Connection Settings (optional - auto-detected from environment variables):
#   - api_base: Override API endpoint (default: reads from OPENAI_API_BASE, etc.)
#   - api_key_env: Override API key env var name (default: OPENAI_API_KEY, etc.)
#   - model_kwargs: Additional kwargs passed to litellm
#
# Environment Variable Resolution (by provider):
#   - openai:    OPENAI_API_BASE, OPENAI_BASE_URL, OPENAI_API_KEY
#   - anthropic: ANTHROPIC_API_BASE, ANTHROPIC_BASE_URL, ANTHROPIC_API_KEY
#   - azure:     AZURE_API_BASE, AZURE_OPENAI_ENDPOINT, AZURE_API_KEY
#   - gemini:    GEMINI_API_BASE, GEMINI_API_KEY, GOOGLE_API_KEY

models:
