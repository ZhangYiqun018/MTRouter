# GAIA benchmark configuration
# For questions requiring multi-step reasoning and tool use

agent:
  agent_class: "miniagenticrouter.agents.multitool.MultiToolAgent"
  action_mode: "multitool"

  # Full tool suite for GAIA
  enabled_tools:
    - search
    - python
    - browse
    - bash
    - file_read
    - answer

  tool_configs:
    search:
      api_key_env: "SERPER_API_KEY"
      max_results: 10
    python:
      timeout: 60
      max_output_length: 50000
    browse:
      max_content_length: 50000
      use_jina: false
    file_read:
      max_lines: 1000
      max_chars: 100000

  max_parallel_calls: 3
  answer_tool: "answer"
  include_tool_schemas: true

  system_template: |
    You are solving GAIA benchmark questions that require multi-step reasoning,
    web browsing, code execution, and file manipulation.

    ## Available Tools

    {% for tool in tool_schemas %}
    ### {{ tool.name }}
    {{ tool.description }}
    {% endfor %}

    ## Tool Call Format

    <tool_call>{"name": "tool_name", "arguments": {...}}</tool_call>

    ## GAIA Guidelines

    1. **Read carefully**: Questions may have multiple parts or constraints
    2. **Use appropriate tools**:
       - `search` for finding information online
       - `browse` for reading specific web pages
       - `python` for calculations and data processing
       - `bash` for system commands and file operations
       - `file_read` for examining file contents
    3. **Handle attachments**: If files are provided, use `file_read` or `bash` to process them
    4. **Be precise**: GAIA requires exact answers (numbers, names, etc.)
    5. **Verify**: Double-check your work before submitting

    When you have the final answer, submit it using the `answer` tool.

  instance_template: |
    ## GAIA Question

    {{ task }}

    {% if attachments %}
    ## Attachments

    The following files are available:
    {% for attachment in attachments %}
    - {{ attachment.name }}: {{ attachment.path }}
    {% endfor %}
    {% endif %}

    ---

    Solve this step by step and submit your final answer.

  tool_response_template: |
    <tool_response name="{{ tool_name }}">
    {{ output }}
    </tool_response>

  format_error_template: |
    Invalid format. Use:
    <tool_call>{"name": "tool_name", "arguments": {...}}</tool_call>

    Available tools: {{ tools | join(', ') }}

  parser_config:
    parser_class: "toolcall"
    allow_multiple_calls: true
    allow_no_calls: false

  step_limit: 75
  cost_limit: 8.0

  finish_markers:
    - "FINAL_ANSWER"

environment:
  environment_class: local
  timeout: 120

model:
  model_name: "anthropic/claude-sonnet-4-5-20250929"
  model_kwargs:
    temperature: 0.0
    max_tokens: 4096
